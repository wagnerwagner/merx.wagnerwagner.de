title: Order

status:
  draft: Error
  unlisted: Incomplete
  listed: Complete

options:
  changeSlug: false
  changeTemplate: false
  changeTitle: false
  delete: false

tabs:
  overview:
    columns:
      - width: 1/1
        sections:
          order:
            extends: sections/order
          fields:
            type: fields
            fields:
              company:
                type: text
                required: true
              name:
                type: text
                required: true
              email:
                type: email
                required: true
              street:
                type: text
                required: true
              postal_code:
                type: text
                width: 1/3
              city:
                type: text
                required: true
                width: 2/3
              state:
                type: text
              country:
                type: select
                options: query
                query:
                  fetch: kirby.option('wagnerwagner.site.countryList')
                  text: "{{ arrayItem.value }}"
                  value: "{{ arrayItem.key }}"
                required: true
              legal:
                type: toggle
                required: true
  payment:
    sections:
      payment-method: sections/payment-method
